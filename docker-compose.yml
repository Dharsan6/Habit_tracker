version: '3.8'

services:

  # ── Node.js Backend ───────────────────────────────────────────────────────────
  backend:
    image: dharsan6/lifetracker-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifetracker-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - lifetracker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Flask AI Service ──────────────────────────────────────────────────────────
  ai-service:
    image: dharsan6/lifetracker-ai:latest
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: lifetracker-ai
    environment:
      FLASK_ENV: production
      BACKEND_URL: http://backend:8080/api
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-placeholder}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-placeholder}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-placeholder}
    ports:
      - "5000:5000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lifetracker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    image: dharsan6/lifetracker-frontend:latest
    build:
      context: ./LifeTrack
      dockerfile: Dockerfile
    container_name: lifetracker-frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lifetracker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  lifetracker-network:
    driver: bridge
